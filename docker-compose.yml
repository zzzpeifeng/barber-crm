
version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - NODE_ENV=production
    volumes:
      # 挂载 .env 文件，确保运行时可以读取配置
      - ./packages/backend/.env:/app/packages/backend/.env:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin-web:
    build:
      context: .
      dockerfile: packages/admin-web/Dockerfile
    restart: always
    ports:
      - "3002:80"
    depends_on:
      - backend

  h5-merchant:
    build:
      context: .
      dockerfile: packages/h5-merchant/Dockerfile
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

  
