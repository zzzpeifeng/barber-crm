
version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./.env:/app/packages/backend/.env:ro
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin-web:
    build:
      context: .
      dockerfile: packages/admin-web/Dockerfile
    restart: always
    ports:
      - "3002:80"
    depends_on:
      - backend

  h5-merchant:
    build:
      context: .
      dockerfile: packages/h5-merchant/Dockerfile
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

  
